name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  CI: true

jobs:
  starter-lint:
    name: Starter lint
    runs-on: ubuntu-latest
    if: ${{ hashFiles('package.json', 'bin/cli.js', 'test/**/*.js') != '' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Run lint
        run: npm run lint

  starter-unit:
    name: Starter unit tests (node ${{ matrix.node-version }})
    needs: starter-lint
    runs-on: ubuntu-latest
    if: ${{ hashFiles('package.json', 'bin/cli.js', 'test/**/*.js') != '' }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Run unit tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  starter-e2e:
    name: Starter E2E Playwright (node ${{ matrix.node-version }})
    needs: starter-unit
    runs-on: ubuntu-latest
    if: ${{ hashFiles('package.json', 'playwright.config.ts') != '' && (hashFiles('tests/e2e/**/*.spec.ts') != '' || hashFiles('tests/e2e/**/*.spec.js') != '' || hashFiles('tests/e2e/**/*.test.ts') != '' || hashFiles('tests/e2e/**/*.test.js') != '') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Detect Playwright dependency
        id: playwright-dep
        shell: bash
        run: |
          set -euo pipefail
          if grep -Eq '"(@playwright/test|playwright)"[[:space:]]*:' package.json; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        if: ${{ steps.playwright-dep.outputs.available == 'true' }}
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: ${{ steps.playwright-dep.outputs.available == 'true' }}
        run: npx playwright test

      - name: Skip notice when Playwright dependency is absent
        if: ${{ steps.playwright-dep.outputs.available != 'true' }}
        run: echo "Skipping Playwright execution because the repository does not yet declare a Playwright dependency."

      - name: Upload Playwright HTML report
        if: ${{ always() && steps.playwright-dep.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright test results (traces, screenshots, videos)
        if: ${{ always() && steps.playwright-dep.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 14

  runtime-scaffold:
    name: Runtime scaffold sanity
    runs-on: ubuntu-latest
    if: ${{ hashFiles('CMakeLists.txt', 'runtime/CMakeLists.txt', 'apps/CMakeLists.txt') != '' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify runtime scaffold entrypoints
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "CMakeLists.txt"
            "runtime/CMakeLists.txt"
            "apps/CMakeLists.txt"
            "apps/cli/main.cpp"
            "tests/unit/CMakeLists.txt"
            "tests/e2e/README.md"
          )
          missing=0
          for path in "${required[@]}"; do
            if [ ! -e "$path" ]; then
              echo "::error::missing runtime scaffold path: $path"
              missing=1
            fi
          done
          exit "$missing"
