name: DoD Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
      - develop

concurrency:
  group: dod-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dod-check:
    name: Definition of Done
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect repository lanes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          has_starter=false
          has_runtime_scaffold=false
          has_playwright_specs=false
          has_playwright_dependency=false

          if [ -f package.json ] && [ -f bin/cli.js ] && [ -d test ]; then
            has_starter=true
          fi

          if [ -f CMakeLists.txt ] && [ -f runtime/CMakeLists.txt ] && [ -f apps/CMakeLists.txt ]; then
            has_runtime_scaffold=true
          fi

          shopt -s nullglob globstar
          spec_files=(
            tests/e2e/**/*.spec.ts
            tests/e2e/**/*.spec.js
            tests/e2e/**/*.test.ts
            tests/e2e/**/*.test.js
          )
          if [ ${#spec_files[@]} -gt 0 ]; then
            has_playwright_specs=true
          fi

          if [ -f package.json ] && grep -Eq '"(@playwright/test|playwright)"[[:space:]]*:' package.json; then
            has_playwright_dependency=true
          fi

          echo "has_starter=${has_starter}" >> "$GITHUB_OUTPUT"
          echo "has_runtime_scaffold=${has_runtime_scaffold}" >> "$GITHUB_OUTPUT"
          echo "has_playwright_specs=${has_playwright_specs}" >> "$GITHUB_OUTPUT"
          echo "has_playwright_dependency=${has_playwright_dependency}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: ${{ steps.detect.outputs.has_starter == 'true' || steps.detect.outputs.has_playwright_specs == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: ${{ steps.detect.outputs.has_starter == 'true' || steps.detect.outputs.has_playwright_specs == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Run unit tests with coverage
        if: ${{ steps.detect.outputs.has_starter == 'true' }}
        run: npm test -- --coverage

      - name: Check coverage threshold (>=80%)
        if: ${{ steps.detect.outputs.has_starter == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::error::coverage/coverage-summary.json nao encontrado. Configure o reporter json-summary no test runner."
            exit 1
          fi
          PCT=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")
          echo "Coverage de linhas: ${PCT}%"
          awk -v p="$PCT" 'BEGIN { if (p+0 < 80) { print "::error::Coverage abaixo de 80% (atual: " p "%)"; exit 1 } }'

      - name: Install Playwright browsers
        if: ${{ steps.detect.outputs.has_playwright_specs == 'true' && steps.detect.outputs.has_playwright_dependency == 'true' }}
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: ${{ steps.detect.outputs.has_playwright_specs == 'true' && steps.detect.outputs.has_playwright_dependency == 'true' }}
        run: npx playwright test

      - name: Verify Playwright evidence
        if: ${{ steps.detect.outputs.has_playwright_specs == 'true' && steps.detect.outputs.has_playwright_dependency == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d test-results ] && [ ! -f test-results/results.xml ] && [ ! -f test-results/results.json ]; then
            echo "::error::Evidencia Playwright ausente. Rode 'npx playwright test' e gere artifacts em test-results/."
            exit 1
          fi
          echo "Evidencia Playwright OK em test-results/"

      - name: Skip Playwright requirement until dependency is declared
        if: ${{ steps.detect.outputs.has_playwright_specs == 'true' && steps.detect.outputs.has_playwright_dependency != 'true' }}
        run: echo "Playwright specs exist, but the repository does not yet declare a Playwright dependency; skipping execution in this phase."

      - name: Verify runtime scaffold hand-off
        if: ${{ steps.detect.outputs.has_runtime_scaffold == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "CMakeLists.txt"
            "runtime/CMakeLists.txt"
            "apps/CMakeLists.txt"
            "apps/cli/main.cpp"
            "tests/unit/CMakeLists.txt"
          )
          for path in "${required[@]}"; do
            if [ ! -e "$path" ]; then
              echo "::error::runtime scaffold path missing: $path"
              exit 1
            fi
          done
          echo "Runtime scaffold paths OK"

      - name: Validate PR title (conventional commit)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$PR_TITLE" | npx --yes commitlint --extends @commitlint/config-conventional || {
            echo "::error::Titulo do PR nao segue Conventional Commits (ex: feat: ..., fix: ..., chore: ...)."
            exit 1
          }

      - name: Check task reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PR_BODY:-}" ]; then
            echo "::error::PR body vazio. Inclua referencia a task (ex: 'Closes #42' ou link para .specs/sprints/.../task.md)."
            exit 1
          fi
          if ! echo "$PR_BODY" | grep -Eq '(#[0-9]+|task-?[0-9]+\.md|\.specs/sprints/.+\.task\.md)'; then
            echo "::error::PR body deve referenciar uma task (#NNN, task-NNN.md ou link em .specs/sprints/)."
            exit 1
          fi

      - name: Require ADR link when architecture changes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          if echo "$CHANGED" | grep -Eq '^\.specs/architecture/|^architecture/'; then
            echo "Mudancas detectadas em architecture/. Verificando ADR linkado..."
            if ! echo "${PR_BODY:-}" | grep -Eq '(ADR-[0-9]+|adr-[0-9]+)'; then
              echo "::error::Mudancas em architecture/ exigem ADR linkado no PR body (ex: ADR-001, ADR-042)."
              exit 1
            fi
          fi
